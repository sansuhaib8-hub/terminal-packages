name: Test build dart for aarch64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4

      - name: Setup arm and aarch64 CPU emulators
        uses: dbhi/qus/action@main
        with:
          targets: arm aarch64

      - name: Install NDK r26b in container
        run: |
          ./scripts/run-docker.sh bash -c '
            set -e
            mkdir -p $HOME/lib
            cd $HOME/lib
            echo "Downloading NDK r26b..."
            curl --http1.1 --retry 5 --retry-delay 5 --retry-all-errors -L -o ndk.zip https://dl.google.com/android/repository/android-ndk-r26b-linux.zip
            echo "Extracting..."
            unzip -q ndk.zip
            rm ndk.zip
            ls -la $HOME/lib
          '

      - name: Install build tools (automake, autoconf, libtool)
        run: |
          ./scripts/run-docker.sh sudo apt-get update -y
          ./scripts/run-docker.sh sudo apt-get install -y automake autoconf libtool m4 perl gettext

      - name: Build dart for aarch64 (via docker)
        run: |
          ./scripts/run-docker.sh ./build-package.sh -a aarch64 -o output-dart-test dart

      - name: List built debs
        run: ls -la output-dart-test/

      - uses: actions/upload-artifact@v4
        with:
          name: dart-test-debs
          path: output-dart-test/*.deb
