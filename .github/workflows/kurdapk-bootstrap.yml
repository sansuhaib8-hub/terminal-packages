name: Build kurdapk terminal bootstrap

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - name: Setup arm and aarch64 CPU emulators
        uses: dbhi/qus/action@main
        with:
          targets: arm aarch64

      - name: Install NDK r26b in container
        run: |
          ./scripts/run-docker.sh bash -c '
            set -e
            mkdir -p $HOME/lib
            cd $HOME/lib
            echo "Downloading NDK r26b..."
            curl --http1.1 --retry 5 --retry-delay 5 --retry-all-errors -L -o ndk.zip https://dl.google.com/android/repository/android-ndk-r26b-linux.zip
            echo "Extracting..."
            unzip -q ndk.zip
            rm ndk.zip
            ls -la $HOME/lib
          '

      - name: Install build tools (automake, autoconf, libtool)
        run: |
          ./scripts/run-docker.sh sudo apt-get update -y
          ./scripts/run-docker.sh sudo apt-get install -y automake autoconf libtool m4 perl gettext

      - name: Ensure host python3.11 is available
        run: |
          ./scripts/run-docker.sh bash -c '
            if ! python3.11 --version 2>/dev/null | grep -q "3.11"; then
              cd /tmp
              curl -L -o py311.tar.gz https://github.com/indygreg/python-build-standalone/releases/download/20241016/cpython-3.11.10+20241016-x86_64-unknown-linux-gnu-install_only.tar.gz
              tar xf py311.tar.gz
              sudo ln -sf /tmp/python/bin/python3.11 /usr/local/bin/python3.11
            fi
            python3.11 --version
          '

      - name: Build core packages for aarch64 (via docker)
        run: |
          ./scripts/run-docker.sh ./build-package.sh -a aarch64 -o output-aarch64 coreutils
          ./scripts/run-docker.sh ./build-package.sh -a aarch64 -o output-aarch64 bash
          ./scripts/run-docker.sh ./build-package.sh -a aarch64 -o output-aarch64 python
          ./scripts/run-docker.sh ./build-package.sh -a aarch64 -o output-aarch64 git
          ./scripts/run-docker.sh bash -c "rm -f /data/data/.built-packages/pcre2"
          ./scripts/run-docker.sh ./build-package.sh -a aarch64 -o output-aarch64 pcre2
          ./scripts/run-docker.sh bash -c "rm -f /data/data/.built-packages/zlib"
          ./scripts/run-docker.sh ./build-package.sh -a aarch64 -o output-aarch64 zlib
          ./scripts/run-docker.sh bash -c "rm -f /data/data/.built-packages/openssl"
          ./scripts/run-docker.sh ./build-package.sh -a aarch64 -o output-aarch64 openssl
          ./scripts/run-docker.sh bash -c "rm -f /data/data/.built-packages/libnghttp2"
          ./scripts/run-docker.sh ./build-package.sh -a aarch64 -o output-aarch64 libnghttp2
          ./scripts/run-docker.sh bash -c "rm -f /data/data/.built-packages/libssh2"
          ./scripts/run-docker.sh ./build-package.sh -a aarch64 -o output-aarch64 libssh2
          ./scripts/run-docker.sh bash -c "rm -f /data/data/.built-packages/libexpat"
          ./scripts/run-docker.sh ./build-package.sh -a aarch64 -o output-aarch64 libexpat
          ./scripts/run-docker.sh bash -c "rm -f /data/data/.built-packages/libcurl"
          ./scripts/run-docker.sh ./build-package.sh -a aarch64 -o output-aarch64 libcurl
          ./scripts/run-docker.sh bash -c "rm -f /data/data/.built-packages/libandroid-support /data/data/.built-packages/libiconv /data/data/.built-packages/ncurses /data/data/.built-packages/readline"
          ./scripts/run-docker.sh ./build-package.sh -a aarch64 -o output-aarch64 libandroid-support
          ./scripts/run-docker.sh ./build-package.sh -a aarch64 -o output-aarch64 libiconv
          ./scripts/run-docker.sh ./build-package.sh -a aarch64 -o output-aarch64 ncurses
          ./scripts/run-docker.sh ./build-package.sh -a aarch64 -o output-aarch64 readline

      - name: List built debs
        run: ls -la output-aarch64/

      - name: Assemble bootstrap zip (bash + coreutils)
        run: |
          mkdir -p bootstrap_raw bootstrap
          cd bootstrap_raw
          for deb in ../output-aarch64/bash_*.deb ../output-aarch64/coreutils_*.deb ../output-aarch64/libandroid-support_*.deb ../output-aarch64/libiconv_*.deb ../output-aarch64/ncurses_*.deb ../output-aarch64/*readline*.deb; do
            ar x "$deb"
            tar xf data.tar.xz
            rm -f data.tar.xz control.tar.xz debian-binary
          done
          cd ..
          cp -r bootstrap_raw/data/data/*/files/usr bootstrap/
          python3 split_exec_data.py bootstrap/usr bootstrap-exec bootstrap-data/usr
          sudo apt-get install -y patchelf
          patchelf --replace-needed libreadline.so.8 libreadline.so bootstrap-exec/bin_bash.so
          patchelf --replace-needed libncursesw.so.6 libncursesw.so bootstrap-exec/libreadline.so
          zip -r kurdapk-bootstrap-exec.zip bootstrap-exec
          tar czf kurdapk-bootstrap-data.tar.gz bootstrap-data

      - name: Assemble python zip
        run: |
          mkdir -p python-pkg-raw python-pkg
          cd python-pkg-raw
          for deb in ../output-aarch64/python*.deb; do
            ar x "$deb"
            tar xf data.tar.xz
            rm -f data.tar.xz control.tar.xz debian-binary
          done
          cd ..
          cp -r python-pkg-raw/data/data/*/files/usr python-pkg/
          python3 split_exec_data.py python-pkg/usr python-exec python-data/usr
          patchelf --replace-needed libpython3.11.so.1.0 libpython3.11.so python-exec/bin_python3.11.so
          zip -r kurdapk-python-exec.zip python-exec
          tar czf kurdapk-python-data.tar.gz python-data

      - name: Assemble git zip
        run: |
          mkdir -p git-pkg-raw git-pkg
          cd git-pkg-raw
          for deb in ../output-aarch64/git*.deb ../output-aarch64/pcre2*.deb ../output-aarch64/zlib*.deb ../output-aarch64/openssl*.deb ../output-aarch64/libnghttp2*.deb ../output-aarch64/libssh2*.deb ../output-aarch64/libexpat*.deb ../output-aarch64/libcurl*.deb; do
            ar x "$deb"
            tar xf data.tar.xz
            rm -f data.tar.xz control.tar.xz debian-binary
          done
          cd ..
          cp -r git-pkg-raw/data/data/*/files/usr git-pkg/
          python3 split_exec_data.py git-pkg/usr git-exec git-data/usr
          zip -r kurdapk-git-exec.zip git-exec
          tar czf kurdapk-git-data.tar.gz git-data

      - uses: actions/upload-artifact@v4
        with:
          name: kurdapk-bootstrap-exec
          path: kurdapk-bootstrap-exec.zip

      - uses: actions/upload-artifact@v4
        with:
          name: kurdapk-bootstrap-data
          path: kurdapk-bootstrap-data.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: kurdapk-python-exec
          path: kurdapk-python-exec.zip

      - uses: actions/upload-artifact@v4
        with:
          name: kurdapk-python-data
          path: kurdapk-python-data.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: kurdapk-git-exec
          path: kurdapk-git-exec.zip

      - uses: actions/upload-artifact@v4
        with:
          name: kurdapk-git-data
          path: kurdapk-git-data.tar.gz

      - name: Sanitize deb filenames (remove epoch colon, e.g. openssl-static_1:3.1.4)
        run: |
          cd output-aarch64
          for f in *:*; do
            [ -e "$f" ] || continue
            mv -- "$f" "$(echo "$f" | tr ':' '-')"
          done
          cd ..

      - uses: actions/upload-artifact@v4
        with:
          name: kurdapk-bootstrap-aarch64
          path: output-aarch64/*.deb
