name: Build kurdapk terminal bootstrap

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - name: Setup arm and aarch64 CPU emulators
        uses: dbhi/qus/action@main
        with:
          targets: arm aarch64

      - name: Install NDK r26b in container
        run: |
          ./scripts/run-docker.sh bash -c '
            set -e
            mkdir -p $HOME/lib
            cd $HOME/lib
            echo "Downloading NDK r26b..."
            curl -L -o ndk.zip https://dl.google.com/android/repository/android-ndk-r26b-linux.zip
            echo "Extracting..."
            unzip -q ndk.zip
            rm ndk.zip
            ls -la $HOME/lib
          '

      - name: Install build tools (automake, autoconf, libtool)
        run: |
          ./scripts/run-docker.sh sudo apt-get update -y
          ./scripts/run-docker.sh sudo apt-get install -y automake autoconf libtool m4 perl gettext

      - name: Ensure host python3.11 is available
        run: |
          ./scripts/run-docker.sh bash -c '
            if ! python3.11 --version 2>/dev/null | grep -q "3.11"; then
              cd /tmp
              curl -L -o py311.tar.gz https://github.com/indygreg/python-build-standalone/releases/download/20241016/cpython-3.11.10+20241016-x86_64-unknown-linux-gnu-install_only.tar.gz
              tar xf py311.tar.gz
              sudo ln -sf /tmp/python/bin/python3.11 /usr/local/bin/python3.11
            fi
            python3.11 --version
          '

      - name: Build core packages for aarch64 (via docker)
        run: |
          ./scripts/run-docker.sh ./build-package.sh -a aarch64 -o output-aarch64 coreutils
          ./scripts/run-docker.sh ./build-package.sh -a aarch64 -o output-aarch64 bash
          ./scripts/run-docker.sh ./build-package.sh -a aarch64 -o output-aarch64 python
          ./scripts/run-docker.sh ./build-package.sh -a aarch64 -o output-aarch64 git

      - name: List built debs
        run: ls -la output-aarch64/

      - name: Assemble bootstrap zip (bash + coreutils)
        run: |
          mkdir -p bootstrap_raw bootstrap
          cd bootstrap_raw
          for deb in ../output-aarch64/bash_*.deb ../output-aarch64/coreutils_*.deb; do
            ar x "$deb"
            tar xf data.tar.xz
            rm -f data.tar.xz control.tar.xz debian-binary
          done
          cd ..
          cp -r bootstrap_raw/data/data/*/files/usr bootstrap/
          zip -r kurdapk-bootstrap.zip bootstrap

      - name: Assemble python zip
        run: |
          mkdir -p python-pkg-raw python-pkg
          cd python-pkg-raw
          for deb in ../output-aarch64/python*.deb; do
            ar x "$deb"
            tar xf data.tar.xz
            rm -f data.tar.xz control.tar.xz debian-binary
          done
          cd ..
          cp -r python-pkg-raw/data/data/*/files/usr python-pkg/
          zip -r kurdapk-python.zip python-pkg

      - name: Assemble git zip
        run: |
          mkdir -p git-pkg-raw git-pkg
          cd git-pkg-raw
          for deb in ../output-aarch64/git*.deb; do
            ar x "$deb"
            tar xf data.tar.xz
            rm -f data.tar.xz control.tar.xz debian-binary
          done
          cd ..
          cp -r git-pkg-raw/data/data/*/files/usr git-pkg/
          zip -r kurdapk-git.zip git-pkg

      - uses: actions/upload-artifact@v4
        with:
          name: kurdapk-bootstrap-zip
          path: kurdapk-bootstrap.zip

      - uses: actions/upload-artifact@v4
        with:
          name: kurdapk-python-zip
          path: kurdapk-python.zip

      - uses: actions/upload-artifact@v4
        with:
          name: kurdapk-git-zip
          path: kurdapk-git.zip

      - uses: actions/upload-artifact@v4
        with:
          name: kurdapk-bootstrap-aarch64
          path: output-aarch64/*.deb
